# Temporary HTTP-only config — use BEFORE Let's Encrypt certs exist.
# After certbot succeeds, switch to rain-api.conf (full HTTPS).
#
#   sudo cp nginx/rain-api-init.conf /etc/nginx/sites-available/rain-api.conf
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot certonly --webroot -w /var/www/certbot -d rain-docs.bidesh.online
#   sudo cp nginx/rain-api.conf /etc/nginx/sites-available/rain-api.conf
#   sudo nginx -t && sudo systemctl reload nginx

upstream rain_backend {
    server 127.0.0.1:8080;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name rain-docs.bidesh.online;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    client_max_body_size 2m;

    location / {
        proxy_pass http://rain_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
