# Rain API — rain-docs.bidesh.online → Rain on 127.0.0.1:8080
#
# Ubuntu setup (run on the server):
#
#   sudo apt update
#   sudo apt install -y nginx certbot python3-certbot-nginx
#   sudo mkdir -p /var/www/certbot
#
#   # 1) HTTP-only first (comment out the 443 server block below, keep port 80)
#   sudo cp nginx/rain-api.conf /etc/nginx/sites-available/rain-api.conf
#   sudo ln -sf /etc/nginx/sites-available/rain-api.conf /etc/nginx/sites-enabled/rain-api.conf
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
#   # 2) Get certificate (port 80 must be open in security group)
#   sudo certbot certonly --webroot -w /var/www/certbot -d rain-docs.bidesh.online
#
#   # 3) Enable full config (uncomment 443 block if you commented it), then:
#   sudo nginx -t && sudo systemctl reload nginx
#
#   # Auto-renewal (certbot timer is installed by default)
#   sudo certbot renew --dry-run
#
# EC2 security group: inbound 80 and 443

upstream rain_backend {
    server 127.0.0.1:8080;
    keepalive 8;
}

# HTTP — ACME challenges + redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name rain-docs.bidesh.online;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — proxy to Rain
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name rain-docs.bidesh.online;

    ssl_certificate /etc/letsencrypt/live/rain-docs.bidesh.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rain-docs.bidesh.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 2m;

    location / {
        proxy_pass http://rain_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
