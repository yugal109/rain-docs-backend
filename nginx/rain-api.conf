# Rain MNIST API — reverse proxy to Rain on localhost:8080
#
# Install (Amazon Linux / RHEL):
#   sudo dnf install -y nginx
#
# Install (Ubuntu):
#   sudo apt install -y nginx
#
# Deploy this file:
#   sudo cp nginx/rain-api.conf /etc/nginx/conf.d/rain-api.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# EC2 security group: open 80 (and 443 if you add TLS later)

upstream rain_backend {
    server 127.0.0.1:8080;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;

    # Replace with your domain, or use the instance public IP for testing
    server_name 13.61.6.160;

    client_max_body_size 2m;

    location / {
        proxy_pass http://rain_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
